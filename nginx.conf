# Nginx reverse proxy config for Citefi on Digital Ocean
# Place this at: /etc/nginx/sites-available/citefi
# Then: sudo ln -s /etc/nginx/sites-available/citefi /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# After testing HTTP, run:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect www → non-www (optional)
    # if ($host = www.yourdomain.com) {
    #     return 301 https://yourdomain.com$request_uri;
    # }

    # Large body for file uploads
    client_max_body_size 100M;

    # Proxy to Next.js / Express
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running AI generation requests
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
    }

    # Static Next.js assets — aggressive caching
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:5000;
        proxy_set_header Host $host;
        expires          1y;
        add_header       Cache-Control "public, immutable";
    }
}

# HTTPS block — certbot will fill this in automatically after you run certbot
# server {
#     listen 443 ssl;
#     server_name yourdomain.com www.yourdomain.com;
#     ...
# }
