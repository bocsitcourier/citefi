<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeoMagic - 60-Second Video Creator</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    
    <!-- React & Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF006E;
            --secondary: #FB5607;
            --accent: #FFBE0B;
            --dark: #0A0E27;
            --light: #F1FAEE;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-hero: linear-gradient(135deg, #0A0E27 0%, #1a1e3a 50%, #2a2e4a 100%);
        }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--gradient-hero);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            animation: pulse 20s ease-in-out infinite;
            top: -50%;
            left: -50%;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            animation: pulse 25s ease-in-out infinite reverse;
            bottom: -50%;
            right: -50%;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.3; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 0.5; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            animation: float 20s infinite linear;
            opacity: 0.6;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            to {
                transform: translateY(-100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Header */
        .header {
            padding: 2rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.1em;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(255, 0, 110, 0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255, 190, 11, 0.8)); }
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--accent);
            margin-top: 0.5rem;
            font-weight: 700;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Form Card */
        .form-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 3rem;
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form Elements */
        .form-section {
            margin-bottom: 2.5rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--accent);
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gradient-2);
            animation: expand 0.5s ease-out;
        }

        @keyframes expand {
            from { width: 0; }
            to { width: 100%; }
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--light);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-field, .textarea-field {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: var(--light);
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-field:focus, .textarea-field:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(255, 190, 11, 0.3);
        }

        .textarea-field {
            min-height: 150px;
            resize: vertical;
        }

        /* Style Pills */
        .style-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .style-pill {
            padding: 0.8rem 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .style-pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 190, 11, 0.3);
        }

        .style-pill.active {
            background: var(--gradient-2);
            border-color: transparent;
            color: white;
            animation: pulse-pill 1s ease-in-out infinite;
        }

        @keyframes pulse-pill {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Upload Area */
        .upload-area {
            border: 3px dashed rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(255, 190, 11, 0.05);
        }

        .upload-area.dragging {
            border-color: var(--primary);
            background: rgba(255, 0, 110, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        /* Generate Button */
        .generate-btn {
            width: 100%;
            padding: 1.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: none;
            border-radius: 15px;
            background: var(--gradient-2);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .generate-btn:hover::before {
            width: 300%;
            height: 300%;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.4);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Progress Section */
        .progress-section {
            margin-top: 3rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .progress-step {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .progress-step.active {
            opacity: 1;
        }

        .progress-step.complete {
            opacity: 0.8;
        }

        .step-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .progress-step.active .step-icon {
            background: var(--gradient-2);
            animation: spin 2s linear infinite;
        }

        .progress-step.complete .step-icon {
            background: var(--gradient-3);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Script Preview */
        .script-preview {
            margin-top: 2rem;
            max-height: 400px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 1rem;
        }

        .segment-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .segment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .segment-number {
            background: var(--gradient-2);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .segment-duration {
            color: var(--accent);
            font-size: 0.9rem;
        }

        /* Download Section */
        .download-section {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-top: 3rem;
        }

        .download-btn {
            padding: 1rem 3rem;
            font-size: 1.1rem;
            background: var(--gradient-3);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
        }

        /* Loading Spinner */
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 3rem;
            }
            
            .form-card {
                padding: 2rem;
            }
            
            .style-pills {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function VeoVideoCreator() {
            const [formData, setFormData] = useState({
                ideaTitle: '',
                shortIdea: '',
                companyName: '',
                website: '',
                callToAction: 'Get Started Today!',
                style: 'cinematic',
                targetAudience: '',
                tone: 'professional'
            });

            const [logoFile, setLogoFile] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [progress, setProgress] = useState({
                step: 0,
                message: '',
                segments: []
            });
            const [generatedVideo, setGeneratedVideo] = useState(null);

            const styles = [
                { id: 'cinematic', name: 'Cinematic Epic', icon: '🎬' },
                { id: 'comedy', name: 'Super Bowl Comedy', icon: '😂' },
                { id: 'emotional', name: 'Emotional Journey', icon: '❤️' },
                { id: 'tech', name: 'Tech & Future', icon: '🚀' },
                { id: 'minimal', name: 'Minimalist', icon: '⚪' },
                { id: 'retro', name: 'Retro Vibes', icon: '🕹️' },
                { id: 'luxury', name: 'Luxury Brand', icon: '💎' },
                { id: 'action', name: 'Action Packed', icon: '💥' }
            ];

            const tones = [
                { id: 'professional', name: 'Professional' },
                { id: 'playful', name: 'Playful' },
                { id: 'inspirational', name: 'Inspirational' },
                { id: 'urgent', name: 'Urgent' },
                { id: 'mysterious', name: 'Mysterious' },
                { id: 'friendly', name: 'Friendly' }
            ];

            useEffect(() => {
                // Create floating particles
                const particlesContainer = document.getElementById('particles');
                for (let i = 0; i < 50; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 20 + 's';
                    particle.style.animationDuration = (20 + Math.random() * 10) + 's';
                    particlesContainer.appendChild(particle);
                }
            }, []);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: value
                }));
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setLogoFile(file);
                }
            };

            const generateScript = async () => {
                // Simulate AI script generation
                const segments = [];
                const totalSegments = 8;
                
                for (let i = 1; i <= totalSegments; i++) {
                    // AI would generate these based on the input
                    segments.push({
                        segment: i,
                        duration: `${(i-1)*7}:${String((i-1)*7+8).padStart(2, '0')}`,
                        scene: `Scene ${i}: ${generateSceneDescription(i, formData)}`,
                        dialogue: generateDialogue(i, formData),
                        veoPrompt: generateVeoPrompt(i, formData),
                        transition: i < totalSegments ? 'Smooth crossfade' : 'Fade to logo'
                    });
                }
                
                return segments;
            };

            const generateSceneDescription = (segment, data) => {
                const scenes = {
                    1: `Opening shot: Establishing ${data.companyName} brand presence`,
                    2: `Problem introduction: What ${data.targetAudience} struggles with`,
                    3: `Building tension: The challenge intensifies`,
                    4: `Solution reveal: ${data.companyName} enters the scene`,
                    5: `Demonstration: Showing the solution in action`,
                    6: `Benefits: How life improves with ${data.companyName}`,
                    7: `Social proof: Others experiencing success`,
                    8: `Call to action: ${data.callToAction} with logo`
                };
                return scenes[segment] || 'Dynamic scene';
            };

            const generateDialogue = (segment, data) => {
                const dialogues = {
                    1: `"${data.shortIdea.substring(0, 50)}..."`,
                    2: "Narrator: 'But there's a problem...'",
                    3: "Character: 'There has to be a better way!'",
                    4: `"Introducing ${data.companyName}"`,
                    5: "Watch how simple it becomes...",
                    6: "Everything changes when you have the right solution",
                    7: "Join thousands who've already transformed their experience",
                    8: `"${data.callToAction} at ${data.website}"`
                };
                return dialogues[segment] || '';
            };

            const generateVeoPrompt = (segment, data) => {
                const style = data.style;
                const tone = data.tone;
                return `${style} style, ${tone} tone, 8-second clip, high production value, 4K resolution, segment ${segment} of 8, consistent visual theme`;
            };

            const handleGenerate = async () => {
                setIsGenerating(true);
                setProgress({ step: 1, message: 'Analyzing your idea...', segments: [] });

                // Step 1: Analyze idea
                await new Promise(resolve => setTimeout(resolve, 2000));
                setProgress({ step: 2, message: 'Generating AI script...', segments: [] });

                // Step 2: Generate script
                await new Promise(resolve => setTimeout(resolve, 3000));
                const segments = await generateScript();
                setProgress({ step: 3, message: 'Creating Veo prompts...', segments });

                // Step 3: Generate Veo videos (simulated)
                await new Promise(resolve => setTimeout(resolve, 4000));
                setProgress({ step: 4, message: 'Generating video segments with Veo AI...', segments });

                // Step 4: Stitching videos
                await new Promise(resolve => setTimeout(resolve, 3000));
                setProgress({ step: 5, message: 'Stitching segments together...', segments });

                // Step 5: Adding branding
                await new Promise(resolve => setTimeout(resolve, 2000));
                setProgress({ step: 6, message: 'Adding your logo and branding...', segments });

                // Step 6: Final rendering
                await new Promise(resolve => setTimeout(resolve, 2000));
                setProgress({ step: 7, message: 'Finalizing your 60-second masterpiece...', segments });

                // Complete
                setGeneratedVideo({
                    url: 'generated_video.mp4',
                    segments: segments,
                    duration: '60 seconds',
                    format: '1920x1080',
                    fps: 30
                });
                setIsGenerating(false);
                setProgress({ step: 8, message: 'Complete! Your video is ready.', segments });
            };

            const progressSteps = [
                { icon: '💡', label: 'Analyzing Idea' },
                { icon: '✍️', label: 'Writing Script' },
                { icon: '🎨', label: 'Creating Prompts' },
                { icon: '🎬', label: 'Generating Videos' },
                { icon: '🔗', label: 'Stitching Segments' },
                { icon: '🏢', label: 'Adding Branding' },
                { icon: '✨', label: 'Final Rendering' },
                { icon: '✅', label: 'Complete!' }
            ];

            return (
                <div className="container">
                    <header className="header">
                        <h1 className="logo">VeoMagic</h1>
                        <p className="tagline">Transform Your Idea Into a 60-Second Masterpiece</p>
                    </header>

                    <div className="form-card">
                        <div className="form-section">
                            <h2 className="section-title">Your Video Idea</h2>
                            
                            <div className="input-group">
                                <label className="input-label">Video Title</label>
                                <input
                                    type="text"
                                    name="ideaTitle"
                                    className="input-field"
                                    placeholder="e.g., Revolutionary Smart Home Assistant"
                                    value={formData.ideaTitle}
                                    onChange={handleInputChange}
                                />
                            </div>

                            <div className="input-group">
                                <label className="input-label">Your Idea (Brief Description)</label>
                                <textarea
                                    name="shortIdea"
                                    className="textarea-field"
                                    placeholder="Describe your product/service idea in 2-3 sentences. AI will expand this into a full script..."
                                    value={formData.shortIdea}
                                    onChange={handleInputChange}
                                />
                            </div>

                            <div className="input-group">
                                <label className="input-label">Target Audience</label>
                                <input
                                    type="text"
                                    name="targetAudience"
                                    className="input-field"
                                    placeholder="e.g., Tech-savvy millennials, busy parents, entrepreneurs"
                                    value={formData.targetAudience}
                                    onChange={handleInputChange}
                                />
                            </div>
                        </div>

                        <div className="form-section">
                            <h2 className="section-title">Visual Style</h2>
                            <div className="style-pills">
                                {styles.map(style => (
                                    <div
                                        key={style.id}
                                        className={`style-pill ${formData.style === style.id ? 'active' : ''}`}
                                        onClick={() => setFormData(prev => ({ ...prev, style: style.id }))}
                                    >
                                        <span>{style.icon}</span> {style.name}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="form-section">
                            <h2 className="section-title">Tone & Voice</h2>
                            <div className="style-pills">
                                {tones.map(tone => (
                                    <div
                                        key={tone.id}
                                        className={`style-pill ${formData.tone === tone.id ? 'active' : ''}`}
                                        onClick={() => setFormData(prev => ({ ...prev, tone: tone.id }))}
                                    >
                                        {tone.name}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="form-section">
                            <h2 className="section-title">Branding</h2>
                            
                            <div className="input-group">
                                <label className="input-label">Company Name</label>
                                <input
                                    type="text"
                                    name="companyName"
                                    className="input-field"
                                    placeholder="Your Company Name"
                                    value={formData.companyName}
                                    onChange={handleInputChange}
                                />
                            </div>

                            <div className="input-group">
                                <label className="input-label">Website</label>
                                <input
                                    type="text"
                                    name="website"
                                    className="input-field"
                                    placeholder="www.yourcompany.com"
                                    value={formData.website}
                                    onChange={handleInputChange}
                                />
                            </div>

                            <div className="input-group">
                                <label className="input-label">Call to Action</label>
                                <input
                                    type="text"
                                    name="callToAction"
                                    className="input-field"
                                    placeholder="e.g., Get Started Today, Learn More, Sign Up Now"
                                    value={formData.callToAction}
                                    onChange={handleInputChange}
                                />
                            </div>

                            <div className="input-group">
                                <label className="input-label">Upload Logo</label>
                                <div className="upload-area">
                                    <div className="upload-icon">
                                        <i className="fas fa-cloud-upload-alt"></i>
                                    </div>
                                    <p>Drag & drop your logo here or click to browse</p>
                                    <input
                                        type="file"
                                        accept="image/*"
                                        onChange={handleLogoUpload}
                                        style={{ display: 'none' }}
                                        id="logo-upload"
                                    />
                                    <label htmlFor="logo-upload" style={{ cursor: 'pointer' }}>
                                        {logoFile && <p style={{ marginTop: '1rem', color: '#FFBE0B' }}>✓ {logoFile.name}</p>}
                                    </label>
                                </div>
                            </div>
                        </div>

                        <button 
                            className="generate-btn"
                            onClick={handleGenerate}
                            disabled={!formData.ideaTitle || !formData.shortIdea || !formData.companyName || isGenerating}
                        >
                            {isGenerating ? 'Generating Your Video...' : '🎬 Generate 60-Second Video'}
                        </button>
                    </div>

                    {(isGenerating || progress.step > 0) && (
                        <div className="progress-section">
                            <h2 className="section-title">Generation Progress</h2>
                            
                            {progressSteps.map((step, index) => (
                                <div 
                                    key={index}
                                    className={`progress-step ${
                                        progress.step === index + 1 ? 'active' : 
                                        progress.step > index + 1 ? 'complete' : ''
                                    }`}
                                >
                                    <div className="step-icon">{step.icon}</div>
                                    <div>
                                        <div style={{ fontWeight: '700' }}>{step.label}</div>
                                        {progress.step === index + 1 && (
                                            <div style={{ fontSize: '0.9rem', color: '#FFBE0B', marginTop: '0.25rem' }}>
                                                {progress.message}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}

                            {progress.segments.length > 0 && (
                                <div className="script-preview">
                                    <h3 style={{ marginBottom: '1rem', color: '#FFBE0B' }}>Generated Script Segments</h3>
                                    {progress.segments.map((segment, index) => (
                                        <div key={index} className="segment-card">
                                            <div className="segment-header">
                                                <span className="segment-number">Segment {segment.segment}</span>
                                                <span className="segment-duration">{segment.duration}</span>
                                            </div>
                                            <p style={{ margin: '0.5rem 0' }}><strong>Scene:</strong> {segment.scene}</p>
                                            <p style={{ margin: '0.5rem 0' }}><strong>Dialogue:</strong> {segment.dialogue}</p>
                                            <p style={{ margin: '0.5rem 0', fontSize: '0.85rem', opacity: 0.7 }}>
                                                <strong>Transition:</strong> {segment.transition}
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {generatedVideo && (
                        <div className="download-section">
                            <h2 className="section-title">Your Video is Ready! 🎉</h2>
                            <p style={{ marginBottom: '2rem' }}>
                                Duration: {generatedVideo.duration} | Format: {generatedVideo.format} | FPS: {generatedVideo.fps}
                            </p>
                            <div>
                                <button className="download-btn">
                                    <i className="fas fa-download"></i> Download Video (MP4)
                                </button>
                                <button className="download-btn">
                                    <i className="fas fa-file-alt"></i> Download Script (PDF)
                                </button>
                                <button className="download-btn">
                                    <i className="fas fa-code"></i> Download Veo Prompts (JSON)
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<VeoVideoCreator />, document.getElementById('root'));
    </script>
</body>
</html>
